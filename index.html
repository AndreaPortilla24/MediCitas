<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCitas — Directorio Médico Bucaramanga</title>
  <meta name="description" content="Encuentra y agenda citas con los mejores especialistas médicos de Bucaramanga y el área metropolitana.">
  <link rel="stylesheet" href="css/base.css">
  <style>
    html { scroll-behavior: smooth; }
    #main-content { min-height: calc(100vh - var(--navbar-h)); }
    .spinner-sm {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      display: inline-block;
      vertical-align: middle;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a class="nav-logo" onclick="App.navigate('home')" href="#home" style="cursor:pointer">
      <div class="nav-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
          <rect x="8" y="2" width="8" height="4" rx="1"/>
          <path d="M5 6h14v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6z"/>
          <path d="M9 12h6M12 9v6"/>
        </svg>
      </div>
      <span class="nav-logo-text">MediCitas</span>
    </a>

    <div class="nav-links" id="nav-links">
      <button class="nav-link" onclick="App.navigate('home')">Inicio</button>
      <button class="nav-link" onclick="App.navigate('directorio')">Directorio</button>
      <button class="nav-link" onclick="App.navigate('planes')">Planes</button>
      <button class="nav-link" onclick="App.navigate('sobre-nosotros')">Nosotros</button>
      <button class="nav-link" onclick="App.navigate('contacto')">Contacto</button>
    </div>

    <div class="nav-right" id="nav-right">
      <button class="btn btn-ghost btn-sm" onclick="App.showModal('login')">Iniciar sesión</button>
      <button class="btn btn-outline btn-sm" onclick="App.navigate('registro-consultorio')">Soy consultorio</button>
      <button class="btn btn-primary btn-sm" onclick="App.showModal('register')">Registrarse</button>
    </div>
  </nav>

  <!-- MAIN -->
  <main id="main-content"></main>

  <!-- MODALS -->
  <div id="modals-container"></div>

  <!-- TOASTS -->
  <div class="toast-container" id="toast-container"></div>

  <!-- SCRIPTS -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/modals.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Render all modal HTML
      renderModals();

      // Parse initial hash or default to home
      const hash = window.location.hash.replace('#', '').split('?')[0] || 'home';
      const validPages = [
        'home','directorio','detalle-consultorio','mis-citas','perfil-paciente',
        'dashboard-consultorio','bandeja','agenda','servicios-esp','estadisticas',
        'galeria','admin','planes','sobre-nosotros','contacto','modelo-canvas',
        'registro-consultorio','pasarela-pago'
      ];
      const startPage = validPages.includes(hash) ? hash : 'home';

      // Set initial history entry without pushing (replace)
      window.history.replaceState({ page: startPage, params: {} }, '', `#${startPage}`);

      // Boot the app
      App.navigate(startPage, {}, false);
      App.renderNav();
    });
  </script>
</body>
</html>
